<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>jdgrid</title>
<style>
  :root{
    --bg:#0C0E12; --fg:#EDEFF2; --dim:#8B93A1; --faint:#3C424E;
    --line:rgba(255,255,255,.1);
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",
      "Noto Sans KR",Roboto,sans-serif;
    background:
      radial-gradient(820px 480px at 50% -12%, rgba(255,255,255,.05), transparent 60%),
      var(--bg);
    padding:40px 20px;
  }
  main{text-align:center}
  .mark{
    display:grid; grid-template-columns:repeat(3, 9px); gap:8px;
    justify-content:center; margin-bottom:28px;
  }
  .mark span{width:9px;height:9px;border-radius:50%;background:var(--faint)}
  .mark span:nth-child(5){
    background:var(--fg);
    box-shadow:0 0 10px rgba(237,239,242,.55);
  }
  h1{font-size:26px;margin:0 0 8px;font-weight:800;letter-spacing:-.4px}
  .sub{color:var(--dim);font-size:14px;margin:0 0 34px}
  .mail{
    display:inline-block; font-size:14px; font-weight:700;
    color:var(--fg); text-decoration:none;
    padding:9px 18px; border:1px solid var(--line); border-radius:999px;
    transition:border-color .2s, background .2s;
  }
  .mail:hover{border-color:rgba(255,255,255,.3); background:rgba(255,255,255,.04)}
  footer{margin-top:44px;color:var(--faint);font-size:12px}
</style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <h1>jdgrid</h1>
    <p class="sub">작고 다정한 앱들을 만듭니다 · little apps, made with care</p>
    <a class="mail" href="mailto:support@jdgrid.com?subject=%5Bjdgrid%5D%20%EB%AC%B8%EC%9D%98%20%C2%B7%20Hello">support@jdgrid.com</a>
    <footer>© 2026 jdgrid</footer>
  </main>
</body>
</html>
